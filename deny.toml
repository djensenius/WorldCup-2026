# Configuration for cargo-deny: keeps a license allow-list, denies known
# vulnerable crates, and flags duplicate dependency versions for review.

[graph]
all-features = true

[licenses]
allow = [
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "CC0-1.0",
    "CDLA-Permissive-2.0",
    "ISC",
    "MIT",
    "MIT-0",
    "MPL-2.0",
    "Unicode-3.0",
    "Unicode-DFS-2016",
    "Zlib",
]
confidence-threshold = 0.93

[advisories]
# `paste` (RUSTSEC-2024-0436) is flagged as unmaintained. It is a proc-macro
# build-time dependency of `ratatui` with no available replacement, and the
# advisory is a maintenance notice rather than a security vulnerability.
ignore = ["RUSTSEC-2024-0436"]
yanked = "warn"

[bans]
multiple-versions = "warn"
wildcards = "deny"
# Workspace-internal crates declare each other with a `path` attribute. This
# flag stops cargo-deny v2 from reporting internal `wc-*` path references as
# wildcard errors.
allow-wildcard-paths = true

[sources]
unknown-registry = "deny"
unknown-git = "warn"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
