name: publish
on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag (e.g. v0.1.0). Created if it does not exist."
        required: true
        type: string
      draft:
        description: "Create the GitHub Release as a draft?"
        required: false
        type: boolean
        default: true
  push:
    tags:
      - "v*"

permissions:
  contents: read

concurrency:
  # Serialize per release tag, regardless of whether we got here via a tag push
  # (github.ref_name = "vX.Y.Z") or a workflow_dispatch with an explicit `tag`
  # input.
  group: publish-${{ inputs.tag || github.ref_name }}
  cancel-in-progress: false

jobs:
  resolve:
    name: resolve release inputs
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.derive.outputs.tag }}
      draft: ${{ steps.derive.outputs.draft }}
    steps:
      - id: derive
        env:
          INPUT_TAG: ${{ inputs.tag }}
          INPUT_DRAFT: ${{ inputs.draft }}
          REF_NAME: ${{ github.ref_name }}
          EVENT_NAME: ${{ github.event_name }}
        run: |
          if [ "$EVENT_NAME" = "push" ]; then
            echo "tag=$REF_NAME" >> "$GITHUB_OUTPUT"
            echo "draft=false" >> "$GITHUB_OUTPUT"
          else
            echo "tag=$INPUT_TAG" >> "$GITHUB_OUTPUT"
            echo "draft=${INPUT_DRAFT:-true}" >> "$GITHUB_OUTPUT"
          fi

  build-deb:
    name: build .deb (${{ matrix.target }})
    needs: resolve
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        target:
          - x86_64-unknown-linux-gnu
          - aarch64-unknown-linux-gnu
          - armv7-unknown-linux-gnueabihf
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9 # master
        with:
          toolchain: 1.95.0
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@23869a5bd66c73db3c0ac40331f3206eb23791dc # v2.9.1
        with:
          key: publish-${{ matrix.target }}
      - uses: taiki-e/install-action@d9be7d8cda89035c9c843f78bd44d4f72d8403d4 # v2
        with:
          tool: cross,cargo-deb
      - name: Cross-build release
        run: cross build -p worldcup26 --release --target ${{ matrix.target }}
      - name: Build .deb
        # --no-strip: the release profile already strips via the Rust linker;
        # running cargo-deb's host `strip` on a cross-compiled binary fails
        # because the host strip is x86_64.
        run: cargo deb -p worldcup26 --no-build --no-strip --target ${{ matrix.target }}
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: deb-${{ matrix.target }}
          path: target/${{ matrix.target }}/debian/*.deb

  build-tarball:
    name: build tarball (${{ matrix.target }})
    needs: resolve
    runs-on: macos-latest
    strategy:
      fail-fast: false
      matrix:
        target:
          - aarch64-apple-darwin
          - x86_64-apple-darwin
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9 # master
        with:
          toolchain: 1.95.0
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@23869a5bd66c73db3c0ac40331f3206eb23791dc # v2.9.1
      - run: cargo build -p worldcup26 --release --target ${{ matrix.target }}
      - name: Pack tarball
        run: |
          set -eu
          mkdir -p "dist/worldcup26-${{ matrix.target }}/completions"
          cp "target/${{ matrix.target }}/release/worldcup26" "dist/worldcup26-${{ matrix.target }}/"
          out_dir="$(find "target/${{ matrix.target }}/release/build" -path '*/out/worldcup26.1' -print -quit | xargs dirname)"
          cp "$out_dir/worldcup26.1" "dist/worldcup26-${{ matrix.target }}/"
          cp "$out_dir/worldcup26" "dist/worldcup26-${{ matrix.target }}/completions/"
          cp "$out_dir/_worldcup26" "dist/worldcup26-${{ matrix.target }}/completions/"
          cp "$out_dir/worldcup26.fish" "dist/worldcup26-${{ matrix.target }}/completions/"
          tar -C dist -czf "dist/worldcup26-${{ matrix.target }}.tar.gz" "worldcup26-${{ matrix.target }}"
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: tarball-${{ matrix.target }}
          path: dist/*.tar.gz

  build-zip:
    name: build zip (x86_64-pc-windows-msvc)
    needs: resolve
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9 # master
        with:
          toolchain: 1.95.0
          targets: x86_64-pc-windows-msvc
      - uses: Swatinem/rust-cache@23869a5bd66c73db3c0ac40331f3206eb23791dc # v2.9.1
      - run: cargo build -p worldcup26 --release --target x86_64-pc-windows-msvc
      - name: Pack zip
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist/worldcup26-x86_64-pc-windows-msvc/completions | Out-Null
          Copy-Item target/x86_64-pc-windows-msvc/release/worldcup26.exe dist/worldcup26-x86_64-pc-windows-msvc/
          $outDir = Get-ChildItem target/x86_64-pc-windows-msvc/release/build -Recurse -Filter worldcup26.1 | Select-Object -First 1 | ForEach-Object { $_.DirectoryName }
          Copy-Item "$outDir/worldcup26.1" dist/worldcup26-x86_64-pc-windows-msvc/
          Copy-Item "$outDir/worldcup26" dist/worldcup26-x86_64-pc-windows-msvc/completions/
          Copy-Item "$outDir/_worldcup26" dist/worldcup26-x86_64-pc-windows-msvc/completions/
          Copy-Item "$outDir/worldcup26.fish" dist/worldcup26-x86_64-pc-windows-msvc/completions/
          Compress-Archive -Path dist/worldcup26-x86_64-pc-windows-msvc -DestinationPath dist/worldcup26-x86_64-pc-windows-msvc.zip
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: zip-x86_64-pc-windows-msvc
          path: dist/*.zip

  publish-crates:
    name: publish crates.io
    needs: resolve
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9 # master
        with:
          toolchain: 1.95.0
      - uses: Swatinem/rust-cache@23869a5bd66c73db3c0ac40331f3206eb23791dc # v2.9.1
        with:
          key: publish-crates
      - name: Verify release lockfile
        if: ${{ needs.resolve.outputs.draft != 'true' }}
        run: cargo metadata --locked --format-version 1 --no-deps > /dev/null
      - name: Skip crates.io publish for draft releases
        if: ${{ needs.resolve.outputs.draft == 'true' }}
        run: echo "Draft release requested; skipping crates.io publish."
      - name: Check crates.io token
        if: ${{ needs.resolve.outputs.draft != 'true' }}
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: |
          set -eu
          if [ -z "$CARGO_REGISTRY_TOKEN" ]; then
            echo "::error::CARGO_REGISTRY_TOKEN secret is required to publish to crates.io."
            exit 1
          fi
      - name: Publish wc-data
        if: ${{ needs.resolve.outputs.draft != 'true' }}
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
          VERSION: ${{ needs.resolve.outputs.tag }}
        run: |
          set -euo pipefail
          crate_version_is_searchable() {
            crate="$1"
            version="$2"
            search_output="$(cargo search "$crate" --limit 100)" || {
              echo "::error::Unable to search crates.io for $crate."
              exit 1
            }
            printf '%s\n' "$search_output" | awk -v crate="$crate" -v version="$version" \
              '$1 == crate && $2 == "=" && $3 == "\"" version "\"" { found = 1 } END { exit found ? 0 : 1 }'
          }

          version="${VERSION#v}"
          if crate_version_is_searchable "wc-data" "$version"; then
            echo "wc-data $version is already published; skipping."
            exit 0
          fi
          cargo publish -p wc-data --locked
      - name: Wait for wc-data to be indexed
        if: ${{ needs.resolve.outputs.draft != 'true' }}
        env:
          VERSION: ${{ needs.resolve.outputs.tag }}
        run: |
          set -euo pipefail
          crate_version_is_searchable() {
            crate="$1"
            version="$2"
            search_output="$(cargo search "$crate" --limit 100)" || {
              echo "::error::Unable to search crates.io for $crate."
              exit 1
            }
            printf '%s\n' "$search_output" | awk -v crate="$crate" -v version="$version" \
              '$1 == crate && $2 == "=" && $3 == "\"" version "\"" { found = 1 } END { exit found ? 0 : 1 }'
          }

          version="${VERSION#v}"
          for attempt in $(seq 1 30); do
            if crate_version_is_searchable "wc-data" "$version"; then
              exit 0
            fi
            echo "wc-data $version is not indexed yet (attempt $attempt/30); waiting..."
            sleep 10
          done
          echo "::error::wc-data $version was not visible in the crates.io index in time."
          exit 1
      - name: Publish worldcup26
        if: ${{ needs.resolve.outputs.draft != 'true' }}
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
          VERSION: ${{ needs.resolve.outputs.tag }}
        run: |
          set -euo pipefail
          crate_version_is_searchable() {
            crate="$1"
            version="$2"
            search_output="$(cargo search "$crate" --limit 100)" || {
              echo "::error::Unable to search crates.io for $crate."
              exit 1
            }
            printf '%s\n' "$search_output" | awk -v crate="$crate" -v version="$version" \
              '$1 == crate && $2 == "=" && $3 == "\"" version "\"" { found = 1 } END { exit found ? 0 : 1 }'
          }

          version="${VERSION#v}"
          if crate_version_is_searchable "worldcup26" "$version"; then
            echo "worldcup26 $version is already published; skipping."
            exit 0
          fi
          cargo publish -p worldcup26 --locked

  release:
    needs: [resolve, build-deb, build-tarball, build-zip, publish-crates]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          path: artifacts
      - name: Flatten artifacts
        run: |
          mkdir -p release
          find artifacts -type f \( -name '*.deb' -o -name '*.tar.gz' -o -name '*.zip' \) -exec cp {} release/ \;
          ls -lh release/
      - uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v3
        with:
          tag_name: ${{ needs.resolve.outputs.tag }}
          draft: ${{ needs.resolve.outputs.draft == 'true' }}
          generate_release_notes: true
          fail_on_unmatched_files: true
          files: release/*

  publish-apt:
    name: publish APT repo (optional gh-pages)
    needs: [resolve, release]
    runs-on: ubuntu-latest
    # Requires public GitHub Pages for unauthenticated apt clients. This repo is
    # currently private, so releases always ship standalone .deb files above;
    # this job is opt-in via ENABLE_GH_PAGES_APT=true and does not test Pages.
    if: ${{ needs.resolve.outputs.draft != 'true' }}
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          pattern: deb-*
          path: apt-artifacts
          merge-multiple: true
      - name: Check whether gh-pages APT publishing is enabled
        id: apt
        env:
          ENABLE_GH_PAGES_APT: ${{ vars.ENABLE_GH_PAGES_APT }}
        run: |
          if [ "$ENABLE_GH_PAGES_APT" = "true" ]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          else
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            echo "::warning::ENABLE_GH_PAGES_APT is not true; skipping gh-pages APT publish. The .debs remain attached to the GitHub release."
          fi
      - name: Install APT repository tooling
        if: ${{ steps.apt.outputs.enabled == 'true' }}
        run: sudo apt-get update && sudo apt-get install -y dpkg-dev
      - name: Build APT repository
        if: ${{ steps.apt.outputs.enabled == 'true' }}
        run: scripts/build-apt-repo.sh apt-artifacts public
      - name: Publish gh-pages branch
        if: ${{ steps.apt.outputs.enabled == 'true' }}
        env:
          TAG: ${{ needs.resolve.outputs.tag }}
        run: |
          set -euo pipefail
          cd public
          touch .nojekyll
          git init -b gh-pages
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .
          git commit -m "publish worldcup26 APT repo for ${TAG}"
          git remote add origin "https://x-access-token:${{ github.token }}@github.com/${{ github.repository }}.git"
          git push --force origin gh-pages
